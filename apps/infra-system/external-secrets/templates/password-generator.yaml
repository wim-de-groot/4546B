apiVersion: generators.external-secrets.io/v1alpha1
kind: ClusterGenerator
metadata:
  name: password-generator
  namespace: infra-system
  labels:
    argocd.argoproj.io/instance: infra-system-external-secrets
spec:
  kind: Password
  generator:
    passwordSpec:
      length: 64
      digits: 10
      symbols: 10
      symbolCharacters: "-_?^#!&%@"
      noUpper: false
      allowRepeat: true 
