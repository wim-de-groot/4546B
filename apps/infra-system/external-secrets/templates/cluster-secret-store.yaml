apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: default 
  labels:
    argocd.argoproj.io/instance: infra-system-external-secrets
spec:
  provider:
    kubernetes:
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: infra-system
          key: ca.crt
      auth:
        serviceAccount:
          name: external-secrets-cert-controller
          namespace: infra-system
