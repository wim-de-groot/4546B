apiVersion: apps/v1
kind: Deployment
metadata:
  name: mealie
  labels:	
    app.kubernetes.io/instance: home-automation-mealie	
    app.kubernetes.io/name: mealie	
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: home-automation-mealie	
      app.kubernetes.io/name: mealie	
  template:
    metadata:
      name: mealie
      labels:	
        app.kubernetes.io/instance: home-automation-mealie	
        app.kubernetes.io/name: mealie	
    spec:
      containers:
        - name: mealie
          image: docker.io/wimdegroot/mealie:test-v3
          env:
            - name: DB_ENGINE 
              value: postgres
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mealie-app
                  key: user
            - name: POSTGRES_PASSWORD 
              valueFrom:
                secretKeyRef:
                  name: mealie-app
                  key: pgpass
            - name: POSTGRES_SERVER 
              value: mealie-rw.home-automation.svc.cluster.local
            - name: POSTGRES_PORT 
              value: "5432"
            - name: POSTGRES_DB 
              valueFrom:
                secretKeyRef:
                  name: mealie-app
                  key: dbname
            - name: TLS_CERTIFICATE_PATH
              value: /etc/tls/tls.crt
            - name: TLS_PRIVATE_KEY_PATH
              value: /etc/tls/tls.key
          envFrom:
            - configMapRef:
                name: mealie
                optional: false
          ports:
            - containerPort: 9000
              name: web
          resources:
            requests:
              cpu: 100m
              memory: 500Mi
            limits:
              cpu: 500m
              memory: 1000Mi
          volumeMounts:
            - mountPath: /app/data
              name: mealie-data
            - mountPath: /etc/tls
              name: mealie-tls
          imagePullPolicy: IfNotPresent
          startupProbe:
            httpGet:
              path: / 
              port: 9000 
              scheme: HTTPS
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 9000
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: 9000
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 3
      restartPolicy: Always
      volumes:
        - name: mealie-data
          emptyDir: {}
        - name: mealie-tls
          secret:
            secretName: mealie-tls
