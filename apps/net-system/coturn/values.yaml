coturn:
  realm:
  replicaCount: 1
  extraOptions:
    - --listening-ip=0.0.0.0
  certificate:
    enabled: true
    dnsName: coturn.4546b
    issuerName: 4546b
  service:
    type: LoadBalancer
    annotations:
      external-dns.alpha.kubernetes.io/hostname: coturn.4546b
  users:
    - name: netbird
      secretKeyRef:
        name: netbird-turn-credentials
        key: password
