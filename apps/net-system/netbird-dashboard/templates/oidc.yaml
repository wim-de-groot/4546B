apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: Client
metadata:
  name: netbird
spec:
  forProvider:
    name: Netbird
    accessType: PUBLIC
    clientId: netbird
    description: Netbird Client
    standardFlowEnabled: true
    directAccessGrantsEnabled: true
    oauth2DeviceAuthorizationGrantEnabled: true
    rootUrl: "https://netbird.united/"
    baseUrl: "https://netbird.united"
    validRedirectUris:
      - "https://netbird.united/*"
    validPostLogoutRedirectUris:
      - "https://netbird.united/*"
    webOrigins:
      - "+"
    realmId: 4546b
    realmIdRef:
      name: 4546b
---
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: ClientScope
metadata:
  name: netbird-api
spec:
  forProvider:
    name: netbird-api
    consentScreenText: Netbird Management API
    includeInTokenScope: true
    realmId: 4546b
    realmIdRef:
      name: 4546b
---
apiVersion: client.keycloak.crossplane.io/v1alpha1
kind: ProtocolMapper
metadata:
  name: netbird-api-audience-mapper
spec:
  forProvider:
    name: Audience for NetBird Management API
    protocol: openid-connect
    protocolMapper: oidc-audience-mapper
    config:
      included.client.audience: "netbird"
      id.token.claim: "false"
      access.token.claim: "true"
      introspection.token.claim: "true"
      userinfo.token.claim: "false"
    clientScopeIdRef:
      name: netbird-api
    realmId: 4546b
    realmIdRef:
      name: 4546b
---
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: ClientDefaultScopes
metadata:
  name: netbird-default-scopes
spec:
  forProvider:
    defaultScopes:
      - acr
      - email
      - profile
      - roles
      - web-origins
      - netbird-api
    clientId: netbird
    clientIdRef:
      name: netbird
    realmId: 4546b
    realmIdRef:
      name: 4546b
