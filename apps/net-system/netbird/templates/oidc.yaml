apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: Client
metadata:
  name: netbird-backend
spec:
  deletionPolicy: Delete
  forProvider:
    name: Netbird Backend
    accessType: CONFIDENTIAL
    clientId: netbird-backend
    clientSecretSecretRef:
      namespace: netbird
      name: netbird-backend-oidc-credentials
      key: clientSecret
    description: Netbird Backend Client
    standardFlowEnabled: true
    directAccessGrantsEnabled: true
    serviceAccountsEnabled: true
    oauth2DeviceAuthorizationGrantEnabled: true
    validRedirectUris:
      - "/*"
    webOrigins:
      - "+"
    realmId: 4546b
    realmIdRef:
      name: 4546b
---
apiVersion: openidclient.keycloak.crossplane.io/v1alpha1
kind: ClientServiceAccountRole
metadata:
  name: netbird-backend-view-users
spec:
  forProvider:
    clientIdRef: 
      name: builtin-4546b-realm-management
    realmId: 4546b
    realmIdRef:
      name: 4546b
    role: view-users
    serviceAccountUserClientIdRef:
      name: netbird-backend
