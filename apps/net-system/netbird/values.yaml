auth:
  audience: netbird
  authority: https://keycloak.united/realms/4546b
  device:
    provider: hosted
    audience: netbird
    authority: https://keycloak.united/realms/4546b
    clientID: netbird
    deviceAuthorizationEndpoint: https://keycloak.united/realms/4546b/protocol/openid-connect/auth
    tokenEndpoint: https://keycloak.united/realms/4546b/protocol/openid-connect/token
    scope: openid
    useIDToken: false

idp:
  managerType: keycloak
  clientID: netbird-backend
  secretKeyRef:
    name: netbird-backend-oidc-credentials
    key: clientSecret
  grantType: client_credentials
  adminEndpoint: https://keycloak.united/admin/realms/4546b
  tokenEndpoint: https://keycloak.united/realms/4546b/protocol/openid-connect/token

stun:
  uri: stun:coturn.united:3478

turn:
  uri: turn:coturn.united:3478
  user: netbird
  secretKeyRef:
    name: netbird-turn-credentials
    key: password

nameOverride: ""

fullnameOverride: ""

management:
  logLevel: debug
  replicaCount: 1

  image:
    repository: netbirdio/management
    pullPolicy: IfNotPresent
    tag: 0.35.2

  imagePullSecrets: []

  serviceAccount:
    create: true
    annotations: {}
    name: ""

  deploymentAnnotations: {}

  podAnnotations: {}

  podSecurityContext: {}

  securityContext: {}

  service:
    type: ClusterIP
    port: 80

  ingress:
    enabled: true

    className: ""

    annotations:
      cert-manager.io/cluster-issuer: 4546b 
      traefik.ingress.kubernetes.io/router.entrypoints: websecure

    hosts:
      - host: netbird.united
        paths:
          - path: /api
            pathType: Prefix 
          - path: /management.ManagementService/
            pathType: Prefix

    tls:
      - secretName: netbird-backend-tls-certificate
        hosts:
          - netbird.united

  resources: {}

  autoscaling:
    enabled: false

    minReplicas: 1

    maxReplicas: 100

    targetCPUUtilizationPercentage: 80

  nodeSelector: {}

  tolerations: []

  affinity: {}

  persistentVolume:
    enabled: true

    accessModes:
      - ReadWriteOnce

    size: 100Mi

  dnsDomain: netbird.united

  extraVolumeMounts:
    - name: trustbundle
      mountPath: /etc/ssl/certs/trust-bundle.pem
      subPath: trust-bundle.pem
  
  extraVolumes:
    - name: trustbundle
      configMap:
        name: 4546b

signal:
  logLevel: info

  uri: netbird.united:443

  protocol: https

  image:
    repository: netbirdio/signal
    pullPolicy: IfNotPresent
    tag: 0.35.2

  imagePullSecrets: []

  serviceAccount:
    create: true

    annotations: {}

    name: ""

  deploymentAnnotations: {}

  podAnnotations: {}

  podSecurityContext: {}

  securityContext: {}

  service:
    type: ClusterIP

    port: 80

  ingress:
    enabled: true

    className: ""

    annotations:
      cert-manager.io/cluster-issuer: 4546b 
      traefik.ingress.kubernetes.io/router.entrypoints: websecure

    hosts:
      - host: netbird.united        
        paths:
          - path: /signalexchange.SignalExchange/
            pathType: Prefix

    tls:
      - secretName: netbird-backend-tls-certificate
        hosts:
          - netbird.united

  resources: {}

  autoscaling:

    enabled: false

    minReplicas: 1

    maxReplicas: 100

    targetCPUUtilizationPercentage: 80

  nodeSelector: {}

  tolerations: []

  affinity: {}

  persistentVolume:
    enabled: true

    accessModes:
      - ReadWriteOnce

    size: 100Mi
