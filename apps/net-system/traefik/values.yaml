traefik:
  ports:
    traefik:
      expose: 
        default: true
    websecure:
      tls:
        enabled: false
  
  providers:
    kubernetesIngress:
      publishedService:
        allowExternalNameServices: true
        enabled: true
  
  logs:
    general:
      format: json
      level: INFO

  service:
    spec:
      loadBalancerIP: 10.0.0.240
