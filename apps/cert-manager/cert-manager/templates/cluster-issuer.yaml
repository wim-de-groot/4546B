apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: cloudflare 
  namespace: cert-manager
spec:
  acme:
    email: 34519486+wim-de-groot@users.noreply.github.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: cloudflare-issuer-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef: 
              name: cloudflare-api-token-secret
              key: api-token                
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: 4546b
  namespace: cert-manager
spec:
  isCA: true
  commonName: 4546b
  secretName: 4546b
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: 4546b
spec:
  ca:
    secretName: 4546b
