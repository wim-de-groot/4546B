apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak
  namespace: authorization
spec:
  secretName: keycloak-tls
  privateKey:
    rotationPolicy: Always
  commonName: keycloak.wimandnaomishome.com
  dnsNames:
    - keycloak.wimandnaomishome.com
  usages:
    - digital signature
    - key encipherment
    - server auth
  issuerRef:
    name: cloudflare
    kind: ClusterIssuer
