apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak
  namespace: authorization
spec:
  secretName: keycloak-tls
  privateKey:
    rotationPolicy: Always
  commonName: keycloak.wimandnaomishome.com
  dnsNames:
    - keycloak.wimandnaomishome.com
  usages:
    - digital signature
    - key encipherment
    - server auth
  issuerRef:
    name: cloudflare
    kind: ClusterIssuer
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "home-automation"
      reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
      reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "home-automation" 
